<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>团宝助手</title>
<style>
  body { font-family: -apple-system, "PingFang SC", sans-serif; margin: 0; padding: 14px; width: 320px; color: #1f2937; }
  h1 { font-size: 14px; margin: 0 0 10px; display:flex; align-items:center; gap:6px; }
  h1 .dot { width:8px; height:8px; border-radius:99px; background:#fb923c; }
  label { font-size: 11px; color:#6b7280; display:block; margin: 8px 0 4px; }
  input, textarea { width: 100%; box-sizing:border-box; border:1px solid #e5e7eb; border-radius:8px; padding: 8px; font-size: 12px; font-family: ui-monospace, monospace; }
  textarea { min-height: 60px; resize:vertical; }
  button { width:100%; margin-top:10px; background:#fb923c; color:white; border:none; border-radius:8px; padding:10px; font-size: 13px; font-weight:600; cursor:pointer; }
  button.secondary { background:#f3f4f6; color:#374151; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .row { display:flex; gap:6px; }
  .row button { margin-top:0; }
  .status { margin-top:10px; padding:8px; font-size:12px; border-radius:6px; background:#f9fafb; color:#374151; max-height:120px; overflow:auto; white-space:pre-wrap; }
  .ok { background:#ecfdf5; color:#065f46; }
  .err { background:#fef2f2; color:#991b1b; }
  .meta { font-size:11px; color:#6b7280; margin-top: 6px; }
</style>
</head>
<body>
  <h1><span class="dot"></span>团宝 → 快团团</h1>
  <label>导出链接或 Token</label>
  <textarea id="input" placeholder="粘贴团宝项目里"发送到快团团"生成的链接"></textarea>
  <div class="row">
    <button id="fetchBtn">拉取项目</button>
    <button id="clearBtn" class="secondary">清空</button>
  </div>
  <div id="project" style="display:none">
    <div class="meta" id="projectMeta"></div>
    <button id="fillBtn">填入当前快团团页面</button>
  </div>
  <div id="status" class="status" style="display:none"></div>
  <script src="popup.js"></script>
</body>
</html>
